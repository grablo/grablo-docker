name: build-image

# On a version tag push (v1.20.0, …) or a manual run:
#   build the amd64 + arm64 multi-arch image and push to GHCR (ghcr.io/grablo/iot-core).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Grablo version (e.g. 1.20.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "v=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push (amd64, arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: |
            GRABLO_VERSION=${{ steps.ver.outputs.v }}
          tags: |
            ghcr.io/grablo/iot-core:${{ steps.ver.outputs.v }}
            ghcr.io/grablo/iot-core:latest
          push: true
          provenance: false
